name: inum
description: INUM - Unified Communications App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Architecture
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.0.0
  get_it: ^8.0.3
  fpdart: ^1.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^15.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  bot_toast: ^4.1.3
  lottie: ^3.3.1

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Storage
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5
  sqflite: ^2.4.0

  # Connectivity
  connectivity_plus: ^6.1.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  timeago: ^3.7.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - .env
